      example:
        fixedAmount:
          currency: USD
          valueDecimal: '0.0195'
        variableRate: '0.15'
        minPerTransaction:
          currency: USD
          valueDecimal: '0.0195'
        maxPerTransaction:
          currency: USD
          valueDecimal: '0.035'
        volumeRanges:
          - fromValue: 1
            toValue: 2
            flatAmount:
