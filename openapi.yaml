        merchantPCIFee:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Fees for PCI compliance.
        invoicePaymentFee:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Fees for invoice payments.
        kybFee:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Fees for business verification.
        kycFee:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Fees for customer verification.
        transactionMonitoringFee:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Fees for transaction risk monitoring.
        total:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
