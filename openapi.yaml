        indefinite:
          type: boolean
          description: True if the RRule set runs indefinitely.
        canceledOn:
          type: string
          format: date-time
        runOn:
          type: string
          format: date-time
        runTransfer:
          $ref: '#/components/schemas/RunTransfer'
        ranOn:
          type: string
          format: date-time
        ranTransferID:
          type: string
        status:
          $ref: '#/components/schemas/OccurrenceStatus'
