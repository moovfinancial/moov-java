        type: string
        format: date-time
      explode: false
    DisputeListFilters.startDateTime:
      name: startDateTime
      in: query
      required: false
      description: Optional date-time parameter to filter all disputes created on and after the provided date and time.
      schema:
        type: string
        format: date-time
