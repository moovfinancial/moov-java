  schemas:
    ACHCompanyEntryDescription:
      type: string
      minLength: 4
      maxLength: 10
      description: An optional override of the default NACHA company entry description for a transfer.
      example: Gym dues
    ACHException:
      type: object
      properties:
        code:
          type: string
        reason:
          type: string
        description:
          type: string
    ACHFees:
      type: object
      required:
        - standardCredit
        - sameDayCredit
        - debits
        - return
        - unauthorizedReturn
        - noticeOfChange
        - bankAccountVerification
        - total
      properties:
        standardCredit:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for standard credit transfers.
        sameDayCredit:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for same-day credit transfers.
        debits:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for debit transfers.
        return:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for authorized returns.
        unauthorizedReturn:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for unauthorized returns.
        noticeOfChange:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for notices of change.
        bankAccountVerification:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Fees for successful bank account verifications via Plaid or MX.
        total:
          allOf:
            - $ref: '#/components/schemas/BillingCountAndAmount'
          description: Total ACH fees.
      description: A detailed breakdown of ACH fees.
    ACHInstitution:
      type: object
      required:
        - name
        - routingNumber
      properties:
        name:
          type: string
          description: Name of the financial institution.
          example: First Citizens
        routingNumber:
          type: string
          maxLength: 9
          example: '123456789'
        address:
          $ref: '#/components/schemas/Address'
        contact:
          $ref: '#/components/schemas/Contact'
    ACHOriginatingCompanyName:
      type: string
      minLength: 4
      maxLength: 16
      description: An optional override of the default NACHA company name for a transfer.
      example: Whole Body Fit
    ACHPaymentDetails:
      type: object
      properties:
        companyEntryDescription:
          $ref: '#/components/schemas/ACHCompanyEntryDescription'
        originatingCompanyName:
          $ref: '#/components/schemas/ACHOriginatingCompanyName'
      description: Options for payment links used to collect an ACH payment.
    ACHPaymentDetailsError:
      type: object
      properties:
        companyEntryDescription:
          type: string
        originatingCompanyName:
          type: string
    ACHPaymentSettings:
      type: object
      required:
        - companyName
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 16
          pattern: '[a-zA-Z0-9- ]+'
          description: The description that shows up on ACH transactions. This will default to the account's display name on account creation.
          example: WholeBodyFitness
    ACHReturnCode:
      type: string
      enum:
        - R02
        - R03
        - R04
        - R05
        - R07
        - R08
        - R10
        - R11
        - R12
        - R13
        - R14
        - R15
        - R16
        - R17
        - R20
        - R23
        - R29
        - R34
        - R38
        - R39
      description: |-
        The return code of an ACH transaction that caused the bank account status to change.

        - R02: Account Closed
        - R03: No Account/Unable to Locate Account
        - R04: Invalid Account Number
        - R05: Improper Debit to Consumer Account
        - R07: Authorization Revoked by Customer
        - R08: Payment Stopped
        - R10: Customer Advises Originator is Not Known or Authorized to Receiver
        - R11: Customer Advises Entry Not in Accordance with the Terms of the Authorization
        - R12: Branch Sold to Another DFI
        - R13: RDFI not qualified to participate
        - R14: Representative payee deceased or unable to continue in that capacity
        - R15: Beneficiary or bank account holder
        - R16: Bank account frozen
        - R17: Entry with Invalid Account Number Initiated Under Questionable Circumstances
        - R20: Non-payment bank account
        - R23: Credit entry refused by receiver
        - R29: Corporate customer advises not authorized
        - R34: Limited participation RDFI
        - R38: Stop Payment on Source Document (Adjustment Entry)
        - R39: Improper Source Document
    ACHTransactionDetails:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ACHTransactionStatus'
        traceNumber:
          type: string
          maxLength: 15
          example: '124782618117'
        return:
          $ref: '#/components/schemas/ACHException'
        correction:
          $ref: '#/components/schemas/ACHException'
        companyEntryDescription:
          $ref: '#/components/schemas/ACHCompanyEntryDescription'
        originatingCompanyName:
          $ref: '#/components/schemas/ACHOriginatingCompanyName'
        secCode:
          $ref: '#/components/schemas/SECCode'
        canceledOn:
          type: string
          format: date-time
        initiatedOn:
          type: string
          format: date-time
        originatedOn:
          type: string
          format: date-time
        correctedOn:
          type: string
          format: date-time
        returnedOn:
          type: string
          format: date-time
        failedOn:
          type: string
          format: date-time
        completedOn:
          type: string
          format: date-time
        debitHoldPeriod:
          $ref: '#/components/schemas/DebitHoldPeriod'
        addenda:
          type: array
          items:
            $ref: '#/components/schemas/TransferACHAddendaRecord'
      description: ACH specific details about the transaction.
    ACHTransactionStatus:
      type: string
      enum:
        - ''
        - initiated
        - originated
        - corrected
        - returned
        - completed
        - canceled
      description: Status of a transaction within the ACH lifecycle.
    AccentColor:
      type: string
      description: A CSS hex color representing an accent color.
      example: '#111111'
    AccessToken:
      type: string
      maxLength: 4096
      description: A value passed to the authorization server to gain access to the system.
      example: eyJhbGciOiJFZERTQSIsImN0eSI6IkpXVCIsImtpZCI6IkR...
    Account:
      type: object
      required:
        - accountID
        - mode
        - accountType
        - displayName
        - profile
        - verification
        - createdOn
        - updatedOn
      properties:
        accountID:
          type: string
          description: Unique identifier for this account.
          example: c520f1b9-0ba7-42f5-b977-248cdbe41c69
        mode:
          $ref: '#/components/schemas/Mode'
        accountType:
          $ref: '#/components/schemas/AccountType'
        displayName:
          type: string
          maxLength: 64
          example: Whole Body Fitness
        profile:
          $ref: '#/components/schemas/Profile'
        metadata:
          $ref: '#/components/schemas/Metadata'
        termsOfService:
          $ref: '#/components/schemas/TermsOfService'
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AccountCapability'
        verification:
          $ref: '#/components/schemas/Verification'
        foreignID:
          type: string
          maxLength: 64
          pattern: '[a-zA-Z0-9,.\/?:''"|~!@#$%^&*()+_= -]+'
          description: Optional alias from a foreign/external system which can be used to reference this resource.
        customerSupport:
          $ref: '#/components/schemas/CustomerSupport'
        settings:
          $ref: '#/components/schemas/Settings'
        createdOn:
          type: string
          format: date-time
          example: '2024-05-06T12:20:38.184Z'
        updatedOn:
          type: string
          format: date-time
          example: '2024-05-06T12:20:38.184Z'
        disconnectedOn:
          type: string
          format: date-time
          example: '2024-05-06T12:20:38.184Z'
      example:
        mode: sandbox
        accountID: 53ca67ea-6fd3-423f-9544-ce2404159d33
        accountType: business
        displayName: Whole Body Fitness LLC
        profile:
          business:
            legalBusinessName: Whole Body Fitness LLC
            ownersProvided: false
        verification:
          verificationStatus: unverified
          status: unverified
        settings:
          cardPayment:
            statementDescriptor: Whole Body Fitness LLC
          achPayment:
            companyName: Whole Body Fitne
        createdOn: '2024-12-16T17:55:20.557151867Z'
        updatedOn: '2024-12-16T17:55:20.557151867Z'
    AccountCapability:
      type: object
      required:
        - capability
        - status
      properties:
        capability:
          type: string
        status:
          type: string
      description: Describes an action or set of actions that an account is permitted to perform.
    AccountCountries:
