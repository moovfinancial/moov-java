    Residual:
      type: object
      required:
        - residualID
        - partnerAccountID
        - periodStart
        - periodEnd
        - merchantFees
        - partnerCost
        - netIncome
        - revenueShare
        - residualAmount
        - createdOn
        - updatedOn
      properties:
        residualID:
          allOf:
            - $ref: '#/components/schemas/ID'
          description: Unique identifier for this residual payment calculation.
        partnerAccountID:
          allOf:
            - $ref: '#/components/schemas/ID'
          description: The partner account ID this residual belongs to.
        periodStart:
          type: string
          format: date-time
          description: Start date and time of the residual calculation period.
        periodEnd:
          type: string
          format: date-time
          description: End date and time of the residual calculation period.
        merchantFees:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Total amount of merchant fees collected during the period. This represents the partner's revenue from merchant fees.
        partnerCost:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Partner's total cost (buy rate) during the period.
        netIncome:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: Net income calculated as merchant fee revenue minus partner costs.
        revenueShare:
          type: string
          description: The revenue share percentage the partner receives, expressed as a decimal string (e.g., "25.00" for 25%).
          example: '2.25'
        residualAmount:
          allOf:
            - $ref: '#/components/schemas/AmountDecimal'
          description: The amount the partner receives as their share of the net income (netIncome × revenueShare).
        createdOn:
          type: string
          format: date-time
          description: Timestamp when the residual was created.
        updatedOn:
          type: string
          format: date-time
          description: Timestamp when the residual was last updated.
